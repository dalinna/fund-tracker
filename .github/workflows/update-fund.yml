name: Update Fund Data

on:
  # 每天北京时间 9:30, 15:30, 21:00 自动运行
  schedule:
    - cron: '30 1,7,13 * * *'  # UTC时间，对应北京时间 9:30, 15:30, 21:00

  # 允许手动触发
  workflow_dispatch:

  # 每次push到main分支时运行
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch fund data
      run: |
        python fetch_fund_data.py

    - name: Generate HTML
      run: |
        python generate_html.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update fund data $(date +'%Y-%m-%d %H:%M:%S')" && git push)
